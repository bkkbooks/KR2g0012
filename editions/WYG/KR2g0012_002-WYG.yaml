body:
  text: 魏鄭公諫續錄巻下元翟思忠撰太宗坐於丹霄門外之西堂引公及右僕射李靖中書令温彦博等入宴言及羣臣才行謂靖等曰朕自為主至於今日官人或上書獻計規朕為善者多矣日月稍久官職漸大志意即移言論漸少無不衰倦唯魏徴與朕為善官職益高志節彌勵見朕一事失所甚於已身有過朝夕孜孜終始如一自立以来唯見此一人而已是以敬之重之同於師傅不以人臣處之其後每謂房𤣥齡等曰魏徴被我拔擢特異其報我亦深矣君與我契濶艱辛多歴年所勞苦之極人莫能加然自即位以来輔弼我躬安我社稷成我今日功業為天下所稱君不得與魏徴比矣文徳皇后誕公主月滿宴羣臣於丹霄殿太宗命公圍碁賭公再拜曰臣無可賭之物不敢煩勞聖躬太宗曰朕知君有物不須致辭公固言無物堪供進者太宗曰朕知君有大忠正君若勝朕與君物君若不如莫虧今日遂與公碁纔下數十子太宗曰君已勝矣賜尚乘馬一匹并金装鞍轡仍賜絹千疋武徳中公與侍中陳叔達中書令蕭瑀左僕射封徳彛太子詹事裴矩等同奉詔分修魏梁陳周齊隋六代史侍中已下各居權要既不相統攝撰者無所稟承歴數年竟無次序貞觀初公為秘書監乃奏停後魏而脩梁以下五代奉勅遣秘書丞令狐徳棻秘書郎岑文本撰周史前中書侍郎顔師古給事中孔穎達撰隋史著作郎姚思㢘撰梁陳史中書舎人李百藥撰齊史師古徙職以許敬宗代之公受詔總加脩撰裁定去取咸資筆削多所損益務在簡正隋史序論皆出公手梁陳及齊各為總論梁史六帙五十六巻陳史四帙三十六巻周史五帙五十巻齊史五帙五十巻隋史六帙五十五巻奏之時稱良史加左光禄大夫進封鄭國公賜物五千段公詣朝堂抗表譲左光禄大夫附崔確奏稱臣在隋朝備經喪亂如臣流輩死亡略盡臣得奉太平又特䝉拔擢恩澤既深唯思報効但臣先有眼疾比加風疹轉加増劇天纔隂晦數步之外全不見人倉卒轉動即覺心識悶亂方今天下無事英彦如林無容痼疾之人久在樞近非但不可更加二品仍乞解侍中之職授臣一二品散官不離左右足申愚見拾遺補缺非敢虚飾此實臣志願太宗令崔敦禮謂之曰國之安危資於輔弼得其人則日隆日化失其人則敗不旋踵公寛以接下忠以奉上朕每有乖僻公未嘗不言社稷安危唯公是寄假使公全無兩目猶當舁公置於左右朝夕諮詢况公所患非重便欲拂衣高蹈匪獨乖於朕意僉議以為未可太宗謂侍臣曰我疹病移一舊閣伊乃謗我作望陵臺公等須為我鞫問又謂楊師道曰卿道姜行本作處用十車銅聞誰道師道奏曰魏徴道太宗問曰何以生此公不應太宗再三問對曰道十車銅是諫争語臣若道姓名某即是謗訕必不益聖徳太宗曰我有事皆向卿道今卿乃為在下不向朕道是朕盡心向卿卿不盡心向朕也因令御史引出鞫問之乃謂治書侍御史杜正倫曰朕於天下亦是有功每至祠祭雖不親行常心懷􅋺懼魏徴於朕非義從府臣朕於罪人之中擢與富貴得朕借問遂有所隱朕事天即能畏敬魏徴即事便不盡心昔蕭何有大功於漢家秪為請上林地漢高祖尚繫械之計魏徴勲庸豈得與蕭何為等朕為其能諫遂寵遇至此乃恃寵自驕朕昔問房𤣥齡事答云不知徴當即奏稱豈有人臣報主得有所隱朕今借問便不盡心遣御史推問乃負氣如此行步若朕兒能諫諍還作此驕慢亦須撲殺朕到伊上豈有顧惜看伊意况似國家不得伊時即不得理古来帝王未有魏徴亦得為化在朕今日何藉魏徴勅杜正倫􅄩案問公附奏稱此閣初移臣等面奉勅㫖本為避濕所造不多但衆庶無知或有謗議臣初聞望陵臺名即欲内奏仍共楊師道平章云此名必是浪語若出閣名百姓自然不惑師道語臣有便即奏至尊聽其與説不願即顯姓名非是欲私其人故隱不道陛下深居九重細事不可親見臣作股肱耳目非問無由得知臣數日前見少府監官某乙問訪比来作司事務多少云更無造作事亦不多但北門造閣處須釘鐷甚急恐少便須市供作司唯恐闕乏獲罪臣即語云移一舊閣費用㡬何報臣云雖是舊事料理釘鐷須十車五車臣即師道説前日面奉進止所造蓋亦不多役人又是丁匠何因人有此語師道共臣平章只是至尊每事存養無所造作人見小小事即以為多百姓不可家至戸説那可彰其言語遂釋不問太宗御百福殿公奉謝太宗令韋挺謂之曰卿罪重于千鈞朕任卿使卿踰於管仲自近代以来君臣相得未似今日昨問卿事遂隱不言朕今思量深可怪恨向若遂即不道終不與卿相見若論十年任使一朝遂失朕意可不惜邪賴卿出外列其姓名朕録卿忠誠所以不責公對曰臣本九泉下人䝉陛下拔擢職在樞近已經十年情有所守昨日遂被聞奏罪合萬死陛下平一海内愛養生人天授明徳情存至化軍國機務皆出聖躬臣承受不暇有何功績昨日若死今日無由奉見聖顔皇孫載誕太宗幸東宮置酒極歡羣臣等奏稱皇子多已長成而陛下初未有孫今者東宮先誕首嫡此卜代之休徴無疆之美慶也率土蒼生莫不忭舞臣等喜躍特百常情太宗曰君子抱孫不抱子此是社稷之慶公等又助朕盡飲朕安得不喜酒酣太宗召左僕射房𤣥齡及公於御牀前地席謂曰貞觀以前從朕平定天下夷凶剋亂周旋艱辛𤣥齡功勲何所與讓太宗自解佩刀以賜之又曰貞觀以来盡心于主獻納忠讜國安人利犯顔正諫匡朕之違唯見魏徴一人古之名臣何以加此又解佩刀以賜之戴氏禮并為注解二帙二十巻上之詔曰禮經殘缺其来巳久漢代戴聖爰記舊聞古今所宗條目雜亂先儒𫝊授多歴年數咸事因循按條目雜亂句疑屬此處莫能釐正特進鄭國公徴文髙翰林學綜册府服膺典禮有志討論乃依聖所記更事編録以𩔖相從别為篇第并更注解文義粲然遂得先聖微言因兹重闡後之學者多有宏益宜付秘書仍令繕寫賜皇太子及諸王各一本并賜物一千匹太宗與羣臣論及十六國諸主優劣太宗曰苻永固何獨為所稱房𤣥齡對曰為任使得人則見稱無其人則不見稱當時為有王景略太宗謂羣臣曰此猶朕之有魏徴公拜謝焉公奏自豫章公主薨逝陛下久著素服羣情􅋺慄咸不自寧臣聞古之王者絶於期服此乃前書典禮列代舊章陛下發上聖之慈深下流之慟素服以来遂經旬月悼往之義足為加隆伏願割無已之痛從先王之禮改御常服以副羣下之心臣濫䝉重任不敢寝黙太宗從之太宗謂侍臣曰魏徴何如諸葛亮岑文本對曰諸葛亮按此下疑有脱字一國之政内外寧安又行師用兵威動勍敵見稱今古魏徴雖未事事盡兼至於憂國如家忠言正諫朝夕孜孜古人云亦無以加也太宗曰魏徴懷忠奉國蹈􅂂仁義唯以道徳為務無所欺負執持朕躬必欲致於堯舜之上諸葛所行無以過也所以不如者行師用兵耳太宗謂侍臣曰自知者明人不能善鑒己過如善為文章工諸伎藝皆自謂已善他人不及若良工商略文匠詆訶蕪音拙句往往而有又譬傅母養子頮面豫飾乃堪見人若櫛髪必須明鏡覽其形容以鑒善惡以此而言人君亦須得匡諫之臣道其愆過即其為政無大乖違一日萬㡬一人聽斷細微差僻安能盡無唯有魏徴隨事諫正多中朕失其進喻啓沃有同明鏡分明善惡瞭見已形既數飱嘉言安得不喜太宗因舉觴以賜房𤣥齡髙士㢘等數數勵之皇太子承乾不修徳業魏王泰寵愛日隆内外庶僚咸有疑議太宗聞而惡之謂侍臣曰當今朝臣忠謇無加魏徴我遣傅皇太子用絶天下望遂命草詔謂侍臣曰其辭乎皆曰徴昔為侍中卒以退讓儲傅之重恐必不當太宗曰徴識吾此意将不固辭矣及詔下拜為太子太師公自陳有疾太宗謂之曰太子宗社之本須有師傅故選忠正以為輔弼昔周幽晉獻廢嫡立庶有國行此國必危有家行此家必敗如漢家㡬廢太子賴四皓来助乃始得安我今賴公即其義也知公疹病可卧䕶之公乃就職公疾太宗手詔曰不見數日憂憤甚深自顧過已多矣言已失矣行已虧矣古人云無鏡無以鑑鬚眉可謂實也比欲自往恐勞卿所以使人来去若有聞知此後可以信来具報公奏曰堯舜率天下以仁而人從之桀紂率天下以暴而人從之下之所行皆從上之所好今大臣進一人則疑其親故抑一人則疑其奪權欲遣其人若為展力所以契濶艱辛同其生死聞一人之言即謂可信新来言者何以明其無私又奏曰古者雖犯重罪君上每言寛宥必不獲已方始加刑且人君之威甚於雷霆今欲加其罪則理外誣造将宥其過則法内曲辭欲求刑必寛平吏不嚴酷不可得也又奏曰帝王所重在乎定君臣明父子正夫婦三者不亂然後内外安寧比見弟子凌師奴婢忽主下多輕上皆有為而来漸不可長又奏曰君子有諸已然後求諸人無諸已然後非諸人所藏於身不恕而能喻諸人者未之有也今臨朝堂以至公為言退而行之乃未免私僻之事或恐有所不便聞於在下即横加威怒以掩塞之欲人不知莫若勿為欲盖彌彰掩之何益帝王大如天地信如四時諸葛亮小國之臣猶能開誠心布公道今之為政未能平心亦虧公道心所愛則雖僻不以為非心所嫌則雖正不見其是居人上者其身正不令而行其身不正雖令不從今每發言常疾私相請託或至小事自所未免上為下效理必然也雖加之以罪必不心伏太宗稱善太宗手詔曰近来疹病何似漸得可未卿患日久言面已賖理國立家方知難耳比日自為勞思委頓始驗任人則逸自任則勞非虚言也此懷公想知之可以意得書何盡心略而言耳公宅内無堂太宗常欲為營造公謙讓不受太宗慮公疾甚乃以小殿材為造焉五日而成仍遣中使齎素屏風素褥几案牀等就賜之遂其所尚也公附表陳謝太宗手詔曰觀卿書不如尋常憂惋之情切朕懷意處卿至此當為廣濟黎元經圖達化耳豈為朕一人而已何事果来相謝公疾亟太宗幸其第宅因屏人而語明日降手詔曰觀卿形甚憂悶昨語深慰昨坐久何似但得眠即無苦以卿有古人之風今送被二張勿辭也太宗又幸其第公命加朝服拖紳而見太宗撫之流涕問所欲言公對曰嫠不恤緯而憂宗周之亡乃拜其子叔玉為朝散大夫并賜牙仍遣左屯衛中郎将李安儼夜宿公第動止輒奏皇太子亦再幸其第對之流涕公薨夜太宗夢公若平生及朝而奏之太宗趍臨赴哭之甚慟廢朝五日皇太子亦於西華堂舉哀悲不自勝諸王及文武百官諸州計吏九品以上皆赴喪所詔贈司空相衛黎魏洺邢貝七州諸軍事相州刺史按本𫝊刺史作都督諡曰文貞給羽葆鼔吹班劍四十人賻絹布千段米粟千石陪𦵏昭陵因車載柩無文采之飾申其宿志也公葬日勅京官文武九品以上及計吏並送至開遠門外太宗幸苑西樓望哭盡哀令晉王宣勅祭之太宗因望送作詩曰閶闔總金鞍上林移玉輦野郊愴新别河橋非舊餞慘日映峰沈愁雲隨葢轉哀笳時斷續悲旌乍舒巻望望情何極浪浪淚空泫無復昔時人芳春共誰遣御撰碑文及挽歌詞仍親為書太宗思之不已遂登凌烟閣觀其畫又賦七言詩送靈座焉其辭曰勁篠逢霜摧美質台星失位夭良臣唯當掩泣雲臺上空對餘形無復人林邑獻五色鸚鵡新羅獻美女二人徴以為不宜受上喜曰林邑鸚鵡猶能自言苦寒思歸其國况二女遠别親戚乎并鸚鵡各付使者而歸之陳倉折衝都尉魯寧坐事繫獄自恃髙班慢罵陳倉尉劉仁軌仁軌杕殺之州司以聞上怒命斬之怒猶不解曰何物縣尉敢殺我折衝命追至長安面詰之仁軌曰魯寧對臣百姓辱臣如此臣實忿而殺之辭色自若徴侍側曰陛下知隋之所以亡乎曰何也徴曰隋末百姓强而凌官吏如魯寧之比是也上悦擢仁軌為櫟陽丞徴上疏曰臣聞知臣莫若君知子莫若父父不能知其子則無以睦一家君不能知其臣則無以齊萬國萬國咸寧一人有慶必藉惟按貞觀政要惟作忠良作弼俊乂在官則庶績其凝無為而化矣故堯舜文武見稱前載咸以知人則哲多士盈朝元凱翼巍巍之功周召光煥乎之美然則四岳九官五臣十亂豈唯生之於曩代而獨無於當今者哉在乎求與不求好與不好耳何以言之夫美玉明珠孔翠犀象大宛之馬西旅之獒或無足也或無情也生於八荒之表途遥萬里之外重譯入貢道路不絶者何哉盖由中國之所好也况從仕者懷君之榮食君之禄率之以義将何往而不至哉臣以為與之為忠則可使同乎龍逢比干矣與之為孝則可使同乎曽參子騫矣與之為信則可使同乎尾生展禽矣與之為㢘則可使同乎伯夷叔齊矣然而今之羣臣罕能貞白卓異者求之不切勵之未精故也若朂之以公忠期之以遠大各有職分得行其道貴則觀其所舉富則觀其所養居則觀其所好習則觀其所言窮則觀其所受賤則觀其所不為因其材以取之審其能以任之用其所長掩其所短進之以六正戒之以六邪則不嚴而自勵不勸而自勉矣故説苑曰人臣之行有六正六邪行六正則榮犯六邪則辱何謂六正一曰萌牙未動形兆未見昭然獨見存亡之機得失之要預禁乎未然之前使主超然立乎顯榮之處如此者聖臣也二曰虚心盡意日進善道勉主以禮義諭主以長策将順其美匡救其惡如此者良臣也三曰夙興夜寐進賢不懈數稱往古之行事以厲主意如此者忠臣也四曰明察成敗早防而救之塞其間絶其源轉禍以為福使君終以無憂如此者智臣也五曰守文奉法任官職事不受贈遺辭禄讓賜飲食節儉如此者貞臣也六曰國家昏亂所為不諛敢犯主之嚴顔面言主之過失如此者直臣也是謂六正何謂六邪一曰安官貪禄不務公事與代浮沈左右觀望如此者具臣也二曰主所言皆曰善主所為皆曰可隱而求主之所好而進之以快主之耳目偷合茍容與主為樂不顧後害如此者諛臣也三曰内實險詖外貌小謹巧言令色妬善嫉賢所欲進則明其美隱其惡所欲退則明其過匿其美使主賞罰不當號令不行如此者奸臣也四曰智足以飾非辯足以行説内離骨肉之親外搆亂于朝廷如此者讒臣也五曰専權擅勢以輕為重私門成黨以富其家擅矯主命以自顯貴如此者賊臣也六曰諂主以邪佞陷主于不義朋黨比周以蔽主明使黑白無别是非無間按間原本作門今從貞觀政要改正使主惡布於境内聞於四隣如此者亡國之臣也是謂六邪賢臣處六正之道不行六邪之術故上安而下理生則見樂死則見思此人臣之術也記曰權衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可誣以方圓君子審理不可誣以奸詐然則臣之情偽知之不難矣又設禮以待之執法以御之為善者䝉賞為惡者受罰安敢不企及乎安敢不盡力乎國家思欲進忠良退不肖十有餘載矣徒聞其語不見其人何哉蓋言之是也行之非也言之是則出乎公道行之非則涉乎邪徑是非相亂好惡相攻所愛雖有罪不及于刑所惡雖無辜不免于罰此所謂愛之欲其生惡之欲其死者也或以小惡棄大善或以小過忘大功此所謂君之賞不可以無功求君之罰不可以有罪免者也賞不以勸善罰不以懲惡而望邪正不惑其可得乎若賞不遺疎遠罰不阿親貴以公平為規矩以仁義為凖繩考事以正其名循名以求其實則邪正莫隱善惡自分然後取其實不向按貞觀政要向作尚其華處其厚不居其薄則不言而化期月而可知矣若徒愛美錦而不為人擇官有至公之言無至公之實愛而不知其惡憎而遂忘其善循私情以近邪佞背公道而遠忠良夙夜不怠勞神苦思将求至理不可得也書奏太宗甚嘉納之徴上疏曰臣聞為人君者存乎善善惡惡近君子而遠小人善善明則君子進矣惡惡著則小人退矣近君子則朝無粃政遠小人則聽不私邪小人非無小善君子非無小過君子小過蓋白璧之微瑕小人小善乃鉛刀之一割鉛刀一割良工之所不重小善不足以掩衆惡也按原本作良工所重不足以掩衆惡今從貞觀政要改正白璧微瑕善賈之所不棄按原本無不字今從貞觀政要補入小疵不足以妨大美也小人之小善按貞觀政要作善小人之小善謂之善善君子之小過按貞觀政要作惡君子之小過謂之惡惡此則蒿蘭同臭玉石不分屈原所以沈江卞和所以泣血者既識玉石之分又辨蒿蘭之臭善而不能進惡而不能去此郭氏所以為墟史魚所以為恨者也陛下聰明神武天姿英睿志存汎愛引納多途好善而不甚擇人疾惡而未能遠佞又出言無隱疾惡太深聞人之善或未全信聞人之惡以為必然雖有獨見之明猶恐理或未盡何則君子揚人之善小人訐人之惡聞惡必信則小人之道長矣聞善或疑則君子之道消矣為國者急於進君子退小人乃使君子道消小人道長則君臣失序上下相隔亂亡不恤将何以求夫以善相成謂之同徳以惡相濟謂之朋黨今則清濁共流善惡無别以告訐為誠直以同徳為朋黨以之為朋黨則謂事無可信以之為誠直則謂言皆可取此君恩所以不結於下臣忠所以不達於上大臣不能辯正小臣莫之敢論近遠承風混然成俗非國家之福非為治之道適足以長奸邪亂視聽使人君不知所信臣下不得相安若不遠慮深絶其源則後患未之息也本行之而未敗者由乎君有遠慮雖失之於始必得之於終故按貞觀政要故下有也字若時逢少墮往而不返雖欲悔之必無所及既事失按貞觀政要事失作不可以傳之後嗣復何以埀法将来且夫進善黜惡施於人者也以古作鑒施於已者也鑒貌在乎止水鑒已在乎哲人能以古之哲王鑒於巳之行事則貌之妍媸宛然在目事之善惡自得於心無勞司過之史不假芻蕘之議巍巍之功日著赫赫之名宏遠為人君可不務乎徴上疏曰臣聞君為元首臣作股肱齊契同心合而成體體或不備未有成人然則首雖尊極必資手足以成體君雖明哲必藉股肱以致理故禮云臣以君為心君以臣為體心荘則體舒心肅則容敬書云元首明哉股肱良哉庶事康哉元首叢脞哉股肱惰哉萬事墮哉然則委棄股肱獨任胸臆具體成理非所聞也夫君臣相遇自古為難以石投水千載一合以水投石無時不有其能開按開原本作聞今從貞觀政要改正至公之道申按申字原本作由今從貞觀政要改正天下之用内盡心膂外竭股肱和若鹽梅固同金石者非唯髙位厚秩在於禮之而已昔周文王遊於鳯凰之墟襪系解顧左右莫可使者乃自結之豈周文之朝盡為俊乂聖明之代獨無君子哉但知與不知禮與不禮耳是以伊尹有莘之媵臣韓信項氏之亡命殷湯致禮定王業於南巢漢祖登壇成帝功於垓下若夏桀不棄於伊尹項羽埀恩於韓信寧肯敗已成之國為亡虜乎又微子骨月也受茅土於宋箕子良臣也陳洪範於周仲尼稱其仁莫有非之者禮記稱魯繆公問於子思曰為舊君反服古歟子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若将加諸膝退人若将墜諸淵無為戎首不亦善乎又何反服之有齊景公問於晏子曰忠臣之事君如之何晏子對曰有難不死出亡不送公曰裂地以封之疏爵以待之有難不死出亡不送何也晏子曰言而見用終身無難臣何死焉諫而見納終身不亡臣何送焉若言不見用有難而死是妄死也諫不見納出亡而送是詐忠也春秋左氏𫝊曰崔杼弑齊荘公晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也故君為社稷死則死之為社稷亡則亡之若為已死為已亡非其親昵誰敢任之門啓而入枕尸股而哭興三踊而出孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如土芥臣視君如寇讎雖臣之事君無有二志至於去就之節當縁恩之厚薄然則為人主者安可以無禮於下哉竊觀在朝羣臣當主樞機之寄者或地鄰秦晉或業預經綸並立事立功皆一時之選處之衡軸為任重矣任之雖重信之未篤信之未篤則人或自疑人或自疑則心懷茍且心懷茍且則節義不立節義不立則名教不興名教不興而可以固太平之基保七百之祚未之有也又聞國家重惜功臣不念舊惡方之前聖一無所間然但寛於大事急於小罪臨時責怒未免愛憎之心不可以為政君嚴其禁臣或犯之况上啓其源下必有甚川壅而潰其傷必多欲使凡百黎元何所措其手足此則君開一源下生百端之變無不亂者也禮記曰愛而知其惡憎而知其善若憎而不知其善則為善者必懼愛而不知其惡則為惡者實繁詩曰君子如怒亂庶遄沮然則古人之震怒将以懲惡當今之威罰所以長奸此非堯舜之心也非禹湯之事也書曰撫我則后虐我則讎孫卿子曰君舟也人水也水所以載舟亦以覆舟孔子曰魚失水則死水失魚猶為水也故堯舜戰戰慄慄日慎一日安可不深思之乎安可不熟慮之乎夫委大臣以大體責小臣以小事為國之常也為理之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重将求致治豈可得乎又政貴有恒不求屢易今或責小臣以大體或責大臣以小事乘非其按貞觀政要其作所據大臣失其所守大臣或以小過獲罪按原本無大臣二字今從貞觀政要補入小臣或以大體受罰職非其位罰非其辜欲其無私求其盡力不亦難乎小臣不可委以大事大臣不可責以小罪任其大官求其細過刀筆之吏順㫖承風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退惟咎莫能自明則茍求免禍大臣茍免則譎詐萌生譎詐萌生則矯偽成俗按貞觀政要有矯偽成俗句又不上有則字不可以臻至理又委任大臣欲其盡力每官有所避忌不言則為不盡若舉得其人何嫌於故舊若舉非其任何貴於疎遠待之不盡誠信何以責其忠恕哉臣或有失君亦未為得也夫上之不信於下必以為下無可信矣若必下無可信則上亦有可疑矣禮云上人疑則百姓惑下難知則君長勞上下相疑不可以言至理矣當今羣臣之内遠在一方流言三至而不投杼者臣竊思度未見其人夫以四海之廣兆庶之衆豈無一二可信之人哉蓋信之則無不可疑之則無可信者豈獨臣之過乎一介庸夫結為交友以身相許死且不渝况君臣契合寄同魚水若君為堯舜臣為稷契豈有遇小事則變志見小利則易心哉此雖下之立忠未能明著亦由上懷不信待之過薄之所致也豈君使臣以禮臣事君以忠乎以陛下之聖明以當今之功業誠能博求時俊上下同心則三皇可追而四五帝可俯而六矣夏殷周漢夫何足數太宗深嘉納之初上令羣臣議封建徴以為若封建諸侯則卿大夫咸資俸禄必致厚斂又京畿賦税不多所資畿外若盡以封國邑經費頓闕又燕秦趙代俱帶外夷若有警急追兵内地難以犇赴上謂侍臣曰平定天下朕雖有其事守之失圖功業亦復難保秦始皇初平六國據有四海末年不能善守實可為戒公等宜念公忘私則榮名髙位可以克終其美徴對曰臣聞之戰勝易守勝難陛下深思遠慮安不忘危功業既彰徳教復洽恒以此為政宗社無由傾敗矣按此條已見上巻對李宻王世充優劣條内上謂侍臣曰人言按通鑑言下有天子二字至尊無所畏憚朕則不然上畏皇天之監臨下憚羣臣之瞻仰兢兢業業猶恐不合天意未副人望徴曰此誠致治之要願陛下慎終如始則善矣太宗問徴曰比来朝臣都不論事何也徴對曰陛下虚心採納誠宜有言然古人云未信而諫則謂之謗巳信而不諫謂之尸禄但人之材器各有不同懦弱之人懷忠直而不能言疎逺之人恐不信而不得言懷禄之人慮不便身而不敢言所以相與緘黙俛仰過日太宗曰誠如卿言朕每思之臣欲進諫輒懼死亡之禍與赴鼎鑊冒白刃亦何異哉故忠貞之臣非不欲竭誠乃是極難所以禹拜昌言豈不謂此朕今開懷抱納諫諍卿等無勞怖畏遂不極言太宗問徴曰觀近古帝王有傳位十代者有一代兩代者亦有身得身失者朕所以常懷憂懼或恐撫養生民不得其所或恐心生驕逸喜怒過度然不能自知卿可為朕言之當以為楷則徴對曰嗜欲喜怒之情賢愚皆同賢者能節之不使過度愚者縱之多至失所陛下聖徳𤣥遠居安思危常能自制以保克終之美則萬代永賴上問徴曰人主何為而明何為而暗對曰兼聽則明偏聽則暗昔堯清問下民故有苗之惡得以上聞舜明四目達四聰故共鯀驩兜不能避按通鑑避作蔽也秦二世偏信趙髙取望夷之禍梁武帝偏信朱异取臺城之辱隋煬帝偏信虞世基致彭城之變是故人君兼聽廣納則貴臣不能壅蔽而下情得上通也上謂侍臣曰治國如治病病雖愈尤宜将䕶倘遽自放縱病復作則不可救矣今中國肇安四夷俱服誠自古所希然朕日慎一日唯懼不終故欲數聞卿輩諫諍也徴曰内外治安臣不以為喜惟喜陛下居安思危耳太常少卿祖孝孫奏請所定新樂太宗曰禮樂之設是聖人象按貞觀政要象作縁物設教以為撙節治政善惡豈此之由御史大夫杜淹對曰前代興亡實由於樂按貞觀政要實由於樂下有陳将亡也為玉樹後庭花齊将亡也而為伴侶曲行路聞之莫不悲泣所謂亡國之音以是觀之實由於樂數句故下文太宗云云此録刪之未是太宗曰不然夫音聲豈能感人歡者聞之則悦哀者聽之則悲悲悦在於人心非由樂也今玉樹伴侶之曲其聲俱存朕當為公奏之知公必不悲耳徴對曰古人稱禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉樂在人和不由音調太宗然之太宗謂侍臣曰守天下難易徴對曰甚難太宗曰任賢能受諫諍則可何謂為難徴曰觀自古帝王在於憂危之間則任賢受諫及至安樂必懷寛怠言事者唯令兢懼日陵月替以至危亡聖人所以居安思危正為此也太宗謂侍臣曰朕聞太平後有大亂大亂後必有太平能安天下者惟在用得賢才公等既不能知賢朕又不可遍識日復一日無得人之理今欲令人自舉於事何如徴曰知人者智自知者明知人既以為難自知誠亦不易且愚暗之人皆矜能伐善恐長澆競之風不可令其自舉霍王元軌武徳初封為吳王貞觀七年為夀州刺史屬髙祖崩去職毁瘠過禮自後常服布衣示有終身之戚太宗常問侍臣曰朕子弟孰賢徴對曰臣愚暗不能盡知其能唯吳王數與臣言臣未嘗不自失上曰卿以為前代誰比徴曰經學文雅亦漢之河間乎按貞觀政要河間作獻平注云漢河間獻王徳東平獻王蒼也至於孝行乃古之曽閔也由是寵遇彌厚因令徴女聘焉太宗謂侍臣曰朕觀前代讒佞之徒皆國之蟊賊或巧言令色朋黨比周若暗主庸君莫不以之迷惑忠臣孝子所以泣血銜寃徴曰禮云戒慎乎其所不睹恐懼乎其所不聞詩云愷悌君子無信讒言讒言罔極交亂四國又孔子曰惡利口之覆邦家蓋謂此也臣嘗觀自古有國有家者若曲受讒譖妄害忠良必宗廟丘墟市朝霜露矣陛下深慎之太宗謂侍臣曰人言作天子則得自尊崇無所畏懼朕則以為正合自守謙恭常懷畏懼徴曰古人云靡不有初鮮克有終願陛下守此常謙常懼之道日慎一日則宗社永固無傾覆矣堯舜所以太平實用此法太宗謂房𤣥齡曰朕每觀前代史書彰善癉惡足為将来規誡不知自古當代國史何因不令帝王親見之對曰國史既善惡必書庶㡬人主不為非法此應畏忤旨故不得見也太宗曰卿可撰錄進来𤣥齡等遂刪略國史為編年體撰髙祖太宗實錄各二十巻表上之太宗見六月四日事語多微文謂𤣥齡曰昔周公誅管蔡而周室安季友鴆叔牙而魯國寧朕之所為義同此𩔖蓋所以安社稷利萬人耳史官執筆何煩有隱宜即改削浮詞直書其事徴奏曰臣聞人主位居尊極無所忌憚唯有國史用為懲惡勸善書不以實後人何觀陛下今遣史官正其辭雅合至公之道徴常謁告上冢還言於上曰人言陛下欲幸南山外皆装嚴已畢而竟不行何也上笑曰初實有此心畏卿嗔故中輟耳按以上已見上巻拜掃還鄉節内上嘗得佳鷂自臂之望見徴来匿懷中徴奏事固按通鑑固作故久不已鷂竟死懷中更名破陳樂曰七徳舞徴欲上偃武修文每侍宴見七徳舞輒俯首不視見九功舞則諦觀之詔發卒修洛陽之乾元殿以備巡狩給事中張元素疏諫臣聞阿房宮成秦人散章華臺就楚衆離乾元畢工隋人解體太宗歎曰我不思量遂至於此非其忠直安能若此且衆人之唯唯不如一士之諤諤可賜絹五百疋徴歎曰張公遂有回天之力可謂仁人之言其利博博疑作溥哉太宗謂徴曰自古侯王能自保全者甚少皆由生長富貴好尚驕逸多不解親君子遠小人故耳朕所有子弟欲使見前言往行冀其以為規範因命徴録古来帝王子弟成敗事名為諸侯王善惡録以賜諸王其序曰觀夫膺期受命握圖御宇咸建懿親藩屏王室布在方策可得而言自軒轅分二十五子舜舉十六族爰歴周漢以逮陳隋分裂山河大啓磐石者衆矣保乂王家按貞觀政要保上有或字與時升降或失其土宇不祀忽諸然考其盛衰察其興滅功成名立咸資始封之君國喪身亡多因繼體之後按貞觀政要後作后其故何哉始封之君時逢草昧見王業之艱阻知父兄之憂勤是以在上不驕夙夜匪懈或設醴而求賢或吐飱而接士故甘忠言之逆耳得百姓之歡心樹至徳於生前流遺愛於身後暨乎子孫繼體多屬隆平生自深宮之中長居婦人之手不以髙危為憂懼豈知稼穡之艱難昵近小人疎遠君子綢繆哲婦傲狠明徳犯義悖禮滛荒無度不遵典憲僣差越等恃一顧之權寵便懷匹嫡之心矜一事之微勞遂有無厭之望棄忠貞之正路蹈奸宄之迷途愎諫違卜往而不返雖梁孝齊冏之勲庸淮南河東之才俊摧摩霄之逸翮成窮轍之涸鱗棄桓文之大功就梁董之顯戮埀為明戒可不惜乎皇帝以聖哲之資拯傾危之運耀七徳以清六合總萬國而朝百靈懷柔四荒親睦九族念華萼於棠棣寄維城於宗子心乎愛矣靡日不思爰命下臣考覽載籍博求鑒鏡詒厥孫謀臣輒竭愚淺稽諸前訓凡為藩為翰有國有家者其興也必由於積善其亡也皆在于積惡故知善不積不足以成名惡不積不足以滅身然則禍福無門吉凶由已豈徒然哉今録自古諸王行事得失分其善惡各為一篇名曰諸王善惡錄欲使見善思齊揚名不朽聞惡能改免乎大過從善則有譽改過則無咎興亡是繫可不勉歟太宗覽而稱善謂諸王曰此宜置於左右用為立身之本止嘗罷朝怒曰㑹須殺此田舎翁后問為誰上曰魏徴每廷辱我后退具朝服立於庭上驚問其故后曰妾聞主明臣直今魏徴直由陛下之明故也妾敢不賀魏鄭公諫續録巻下
