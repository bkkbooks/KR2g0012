body:
  text: 魏鄭公諫續錄傳記類二名人之屬提要臣等謹按宋馬端臨經籍考魏鄭公諫錄五巻唐王綝集又元亦祖丁諫錄序云唐王綝集諫錄五巻至順初下邳翟思忠為常州知事摭其餘為續錄二巻續錄自元統中付梓明初流𫝊巳少世所行明人續錄一巻當是未見翟本而意為捜補者今本無編輯姓氏然巻數與亦祖丁説合其為思忠舊帙無疑又按唐書𫝊稱徴自以不世遇乃展盡底藴無所隠前後凡二百餘奏無不剴切當帝心者顧史𫝊所載多𫝊其大而略其細其𫝊者又或加以增飾非復當時言語此本雖捃拾衆説與史𫝊間有異同且有實非諫諍之事而泛濫入之録中者然大旨明白切要頗於治道為有補要非他小説𫝊記比也思忠起家為儒官曾著易𫝊衍太元蓋亦好學稽古之士云乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0e76ed73ed4400a3a21d45fbbd03dc479e4ac9af69851512cd7db0698c8fbd4f
