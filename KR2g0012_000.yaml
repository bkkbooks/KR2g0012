body:
  text: 魏鄭公諫續録傳記類二名人之屬提要臣等謹按宋馬端臨經籍考魏鄭公諫録五卷唐王綝集又元亦祖丁諫録序云唐王綝集諫録五卷至順初下邳翟思忠為常州知事托其餘為續録二卷續録自元統中付梓明初流傳巳少世所行明人續録一卷當是未見翟本而意為搜補者今本無編輯姓氏然卷數與亦祖丁説合其為思忠舊帙無疑又按唐書傳稱徴自以不世遇乃展盡底藴無所隱前後凡二百餘奏無不剴切當帝心者顧史傳所載多傳其大而略其細其傳者又或加以增飾非復當時言語此本雖捃拾衆説與史傳間有異同且有實非諫諍之事而泛濫入之録中者然大旨明白切要頗於治道為有補要非他小説傳記比也思忠起家為儒官曾著易傳衍太元蓋亦好學稽古之士云乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:39c41d847f1d3330d0787d2a26f19e27c071091218ad1cb9ea0f39eeb20c6335
