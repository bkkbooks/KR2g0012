body:
  text: 魏鄭公諫續録卷上元翟思忠撰太宗論自古政化得失因曰大亂之後造次不可致化公對曰不然凡人居安樂則驕逸驕逸則思亂思亂則難化在危困則憂死亡憂死亡則思化思化則易教猶飢人易食也太宗曰善人為邦百年然後勝殘去殺大亂之後將來來疑作求致化寧可造次而望乎公對曰此指常人不在聖哲若聖哲施化上下同心人應如響不疾而速期月而可信不為過三年成功猶謂其晚太宗深納其言右僕射封德彜等咸共非之曰三代以後人漸澆訛按本傳訛作詭下同故秦任法律漢雜霸道皆欲化而不能豈能化而不欲魏徴書生不識時務若信其虛論必敗亂國家公曰五帝三王不易民而化行帝道則帝行王道則王在於當時所按貞觀政要無所字化之而已考之載籍可得而知昔黃帝與蚩尤七十餘戰其亂甚矣既勝之後復致太平九黎亂德顓頊征之既克之後不失其化桀為亂虐而湯放之在湯之日則得太平紂為無道武王伐之成王之日亦致太平若言人漸澆訛不返淳朴至今應悉為鬼魅寧可復得而教化耶德彜等無以難之然心按心字原本作咸以上句文義推求德彜等蓋口不辨而意不謂然從本傳作心為是今改正以為不可太宗力行不倦每謂侍臣曰貞觀之初人皆異論云當今必不可行帝王道唯魏徴勸我而已我從其言不過數載遂得華夏安寧遠夷賓服使我不動干戈數年之間遂至於此皆魏徴之力也又復謂公曰玉雖有美質在石間不值良工琢磨與瓦礫不别若遇良工即為萬代之寶朕雖無美質為公所切磋約我以仁義宏我以道德使朕功業至此公亦足為良匠惟惜不得使封德彜見之公再拜謝曰海內康寧自是陛下威德所加實非羣下之力但喜逢明聖不敢貪天之功太宗曰朕能任公公稱所委其功豈獨在朕乎何取飾讓也上封人多請太宗親納表奏以防壅塞太宗以問公公對曰觀此人意見殊乖大體若請陛下不任百司親庶事豈唯朝堂一所則州縣之務亦須陛下親斷太宗論隋日禁囚公對曰臣昔在隋時聞有盜發煬帝令士澄捕之按貞觀政要士澄上有於字注姓也但有疑即苦加拷掠枉承賊者二千餘人並令同日斬決大理丞張元濟怪之試尋其狀乃有六七人盜發之日先禁他所才被放出亦遭推劾按貞觀政要劾作勘不勝苦痛虛以自誣元濟因此更事尋究二千人內唯有九人不明又按驗九人四人非賊有司不敢執奏遂並殺之太宗曰非唯煬帝無道之君臣下亦不盡忠須相匡諫不避誅戮豈得茍行諂佞求悅譽乎君臣如此何能不敗賴公等共相輔弼遂得囹圄空虛欲公等善始令終常如今日太宗謂侍臣曰齊文宣何如人公對曰非常顛狂然與人共爭道理自知短屈即能從之臣聞齊時魏愷先任青州長史嘗使梁還除光州長史不就楊遵彥奏之文宣帝大怒召而責之愷曰臣先任青州大藩長史今有使勞更無罪過反受小州所以不就乃顧謂遵彥曰此漢有理因令捨之太宗曰往者盧祖尚不肯受官朕遂殺之文宣帝雖顛狂尚能容止此事朕所不如也祖尚不受處分雖失人臣之禮朕即殺之大是傷急一死不可再生悔所無及宜復其官蔭太宗曰周孔儒教非亂代之所行商韓刑法實清平之粃政道既不同固不可一槩也公對曰商鞅韓非申不害等以戰國縱橫間諜交錯禍亂易起譎詐難防務深法峻刑以遏其患所以權救於當時固非致化之通軌太宗與貴臣宴於丹霄殿謂羣臣曰為政之要務全其本若中國不靜遠夷雖至亦何所益朕與公輩共理天下令令疑作今中夏乂安四方靜肅並由公等咸盡忠誠共康庶績之所致爾朕實喜之然安不忘危亦兼以懼朕見隋煬帝纂祚之初天下強盛棄德窮兵以取顛覆頡利近者足為強大意既盈滿禍亂斯及喪其大業為臣於朕葉護可汗亦大強盛自恃富貴通使求婚失道怙亂奄致破滅其子既立便肆猜忌衆叛親離覆基絶嗣朕雖不能遠纂堯舜禹湯之德目覩此輩何得不誡懼乎公等輔朕功績已成唯當慎以守之自致長保並宜勉力事有不可則須明言君臣同心何得不理公對曰陛下宏至化安天下可謂功巳成矣然每覩非常之慶彌切慮危之心自古致慎無以加此臣聞鮑叔牙飲桓公祝曰願君無忘在莒管仲無忘於魯寧戚無忘飯牛陛下居安思危在治思亂無忘之念過叔牙之願矣臣聞上之所好下必從之明詔奬勵足使懦夫立節按本傳高昌平帝宴兩儀殿嘆曰高昌若不失德豈至於亡然朕亦當自戒徴曰昔齊桓公與管仲鮑叔牙寧戚四人飲叔牙奉觴而起曰願君無忘在莒時云云與此異太宗問拓設使人曰拓設兵馬今有幾許對曰見有四千餘兵舊有四萬餘人太宗曰為君之道必須先存百姓若損百姓以奉其身如割脛按貞觀政要脛作股以自啖腹飽而身斃又曰身安天下安必須先正其身未有表正而影曲上理而下亂者朕每思傷其身者不緣外物皆由嗜欲以成其禍若耽嗜滋味玩悅聲色所欲既多所須按貞觀政要須作損亦大既妨政事又攪按貞觀政要攪作擾生人且復出一非理之言萬姓為之解體怨讟既作離叛亦興朕每思此不敢放逸公對曰古昔聖哲之主亦近取諸身遠體諸物昔楚聘詹何曰未聞身理而國亂者陛下所明實古之大義按通鑑武德九年太宗謂侍臣曰君依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃無拓設使人語亦各異太宗謂侍臣曰朕聞西人愛珠若得好珠劈身藏之侍臣曰貪財損已實為可笑太宗曰勿唯可笑今官人貪財不顧性命身死之後子孫被辱何異西人之愛珠耶帝王亦然恣情放逸勞役無度信任羣小疏遠忠正有一於此豈不滅亡隋煬帝奢侈自賢身死匹夫亦為可笑公對曰臣聞魯哀公謂孔子曰有人好忘者移宅乃忘其妻孔子曰又有好忘者甚於此丘見桀紂之君乃忘其身太宗曰朕與公等既知笑人今共相匡輔庶免人笑太宗謂侍臣曰朕見胡裴始畢上書論西蕃事意頗有情理朕謂謂疑作與共語非常戰懼今奏一事人亦應如此公對曰天顔俯臨豈得不懼臣見在外諸司欲奏事者先三五日尋思反覆及其臨奏三分不能道得一分尋常易事尚難如此况爭諫之人出言皆是觸忤賴蒙陛下假其顔色若不如此理終不申太宗曰古來帝王皆欲國祚長久但為威勢既高下情不能上達加以小人君子雜處其間用不得人遂至滅亡公對曰巧佞忠正無代不有但相時君所好而進若用忠正則理用邪佞則亂必然之理也太宗曰為帝王者必須慎其所與只如鷹鷂鞍馬聲色殊味朕若欲之隨須即至如此等事常敗人正道邪佞忠正亦在時君所好若任不得賢何能無滅公對曰臣聞齊威王問淳于髠曰寡人所好與古者聖王同否髠對曰古者聖王所好有四今有有疑作王所好唯有三種古者好色王亦好之古者好馬王亦好之古者好味王亦好之古者好賢王獨不好齊王曰今無賢可好也髠曰古之美色即即疑作則下同有西施毛嬙竒味即有龍肝豹胎善馬即有飛騄耳此等今既無之王之厨膳後宮外廄今亦備矣王若以今之無賢未知前代賢者得與王相見否太宗深然之太宗嘗御瑶池殿顧謂侍臣曰西蕃通來幾時公對曰禹貢云西至流沙又曰西戎即敘不明境域所至漢武帝置燉煌張掖等郡自此以後漸通西域太宗謂羣臣曰朕聞漢武帝時為通西蕃中國百姓死者大半此事著在史籍不能具道但隋後主欲開蔥嶺已西鎮守俱未當死者繼於道路如聞流沙已西仍有隋破壞車轂其邉即有白骨狼籍北築長城東渡遼水征伐不息人無聊生天下叛之聚而為盜煬帝安然恣其所欲遂至滅亡祇為不聞其過朕以此事永為鑒誡今與諸公共理百姓但有不可行即向朕言勿得面從茍相悅譽且朕素無學術未聞政道一日萬幾不能盡經耳目所有處斷恐獨見不明致有失所所以委公等公等善相輔弼使兆庶得所此乃長保富貴蔭及子孫若尸祿曠官茍貪榮利必加黜辱終不容捨朕既以漢武帝隋後主為龜鏡公等亦須常將此事相規諫也羣臣並拜謝公進曰陛下思宏至化砥礪羣下臣等敢不竭股肱之力但恐識度愚淺無益萬分臣聞漢武帝承五代之資天下無事府庫充實士馬強盛遂思騁其欲以事四夷聞蒟醬而開卭僰貪良馬而通大宛老弱疲於轉輸丁壯死乎軍旅海內騷然戶口減半至於國用不足府庫空虛乃𣙜酤鹽鐵征稅關市課算舟車告婚賣爵侵漁百姓萬端俱起外內困窮無以給邉費議以營田代卒冀以助軍迄於暮年方始覺悟下哀痛之詔封丞相為富民侯僅以夀終幾及大亂煬帝恃其強盛思欲追蹤漢武戎車屢動人不聊生十餘年間亡身戮國陛下威加海外無遠不臻深惟二主以為殷鑒所謂一人有慶兆民賴之臣等奉以周旋不敢失墜太宗曰朕遇千慮一失必望有犯無隱太宗曰百官之內應有堪用者朕未能知之不可造次為天下主誠亦難朕今行一事則為天下所觀出一言即為天下所聽用得好人為善者皆勸誤用惡人不善者競進賞當其勞無功者自退罰當其罪為惡者誡懼故知賞罰不可輕行用人彌須審悉公對曰舉選之事自古為難故考績黜陟察其善惡今欲求人必須先訪其行審知其善然後任之假令此人不能濟事只是才力不及不為大害誤用惡人假令強幹為患極多但亂代為為疑作惟求其材不顧其行太平必須材行俱兼始可任用也太宗曰鐵之為用無處不須至於金銀玩好而已不知何意人皆愛之公曰兵仗農器非鐵不可金銀珠玉唯有豐年人以為貨故諺云豐年珠玉儉年穀粟太宗曰正為蕃人愛不可全棄太宗謂孫伏伽曰今以公為諫議大夫必須獻可替否又謂侍臣曰公等全無諫爭公對曰昔者齊景公射不中的而左右俱稱其善景公曰自晏子死不復聞寡人之過弦章對曰上之所好下必從之君若以謇諤為忠則人皆晏子陛下每稱述忠諫之士若有事須獻替誰敢不盡其忠太宗問曰義寧之初國家雖有關中王世充李密各自割據當此之時諸君所事之主誰優誰劣公對曰李密智計英拔而器度局小戴胄奏稱王世充言議分明繁而寡要為化但為一時之利不堪思其後圖太宗曰平定天下朕雖有其事若守之失圖功業亦復難保秦始皇實可為誡公等宜念公忘私榮名高位可以長守公對曰臣聞之戰勝易守勝難陛下深思逺慮安不忘危功業既彰德教復洽常以此為政天下不得不安四海不得不樂吐谷渾使人請婚唐儉奏稱其使大戰懼太宗曰公等以此言虛實公對曰今四方諸國並為陛下臣妾若發一使遣諸國征之立即敗亡何得不懼也太宗曰隋煬帝求覔無已內則淫蕩於聲色外則𠞰人以黷武遂至滅亡朕覩此但以清靜撫之今百姓自言安樂豈知朕之力也公對曰堯人擊壤而歌亦云帝力何有於我哉只將此事以為太平百姓亦不知由主上安之也太宗曰朕今安養百姓豈求其知但論理亂在時君耳公對曰此事非知之難終行之難太宗曰隋日山東養武馬一匹百餘貫錢公對曰當時官人因自販馬粟麥既賤立限令市非理督責乃至破其産業官人馬盡便寬其日月百姓不堪所以聚而為盜太宗謂侍臣曰朕身不下殿堂而四夷賓服此之功業實所重惜思安其術未嘗一日忘也朕見隋煬帝都不以官人違法為意性多猜忌唯慮有反叛者朕則不然但慮公等不遵法式致有寃滯每見告密之徒殊不挂意宜體此心務以德養人即是勿毁之道公對曰陛下平定宇內實如詔旨今功業既定天下巳安而日慎一日務以德勝臣等雖愚敢不奉職職疑作體聖意太宗又謂蕭璟璟疑作瑀下同曰卿在隋時數見皇后否璟對曰自其兒女不得相見臣何人也輒得見之公曰臣聞煬帝特不信齊王常有中使察之奏其飲宴則曰經營何事稱意若其憂悴則曰彼將有他念故爾父子之間且猶至是而况他人乎太宗曰今朕視正道勝煬帝知齊王遠矣太宗謂侍臣曰比三兩月來不見公等讜言未知以朕不可諫爭隱而不言為是庶事咸得不須論也公對曰陛下每見一事即為鑒誡臣等深識聖情必事理有違豈敢隱而不奏然比來大使既出內外無事所以不論太宗曰古來雖復時遭喪亂未有如隋日者朕皆平之功何如古人公對曰前代雖逢喪亂皆有牧宰割據不過數嵗即有所歸至於隋末天下鼎沸百姓塗炭經十餘年陛下應天順人一時平定此乃再造天地重立區夏此之功業古人未有太宗謂右僕射李靖等曰人君之道唯在寬厚非但刑戮乃至鞭撻亦不欲行比每人嫌朕大寬未知此言可行否公對曰古來帝王以殺戮肆威者實非久安之䇿臣等見隋煬帝初有天下亦大威嚴而官人百姓造罪未未疑作不一今陛下仁育天下萬姓獲安臣下雖愚豈容不識恩造太宗曰公等假以為非朕終不改此志太宗謂李靖等曰今且向曉後有一星出東方舊者合昏沒何因更有此星又曰掃星公對曰典籍所載有長星有孛星有彗星長星其形極長孛星小短彗星如掃形今人所謂掃者即是彗星公又奏曰臣聞古帝王未有無災變者但能修德災變自消陛下因有天變遂能誡懼反覆思量深自剋責雖有此變必不為災按貞觀政要貞觀八年有彗星見於南方魏徴進曰云云與此異太宗曰夫人之身假令無病不免有疥癬及時有小惡處用人求備理實為難公對曰自古為政但舉大體堯舜之時非全無惡但為惡者少桀紂之代非全無善但為惡者多譬如百尺之木豈能無一枝節今官人居職豈能全不為非但犯罪者少即是大化太宗謂房玄齡等曰今天下百姓藉我撫養先須令我安穩今上封者惟道九成往來百姓辛苦公對曰陛下意存容納許其進言則妄處多不妨時有可録陛下所有長短此人多不肯隱但容納之亦是善事太宗謂長孫無忌等曰在外百姓太似信佛上封人欲我每日將十箇大德共達官同入令我禮拜觀此乃是道人教其上書公對曰佛法本貴清淨以退浮競且道俗事既不同昔釋道安一時名德苻永固與之同輿權翼以為不可釋惠琳非無才俊宋文引之升殿顔延之云此三台之位豈可使刑餘之人居之今陛下若欲崇信佛教豈須日别見道人吳王恪奉見太宗謂房玄齡等曰朕於兒子常欲一處但國家事義實亦不同欲令其子孫代代相繼且又絶其覬覦朕今供養太上皇與私亦異以鎮撫四海不貽太上皇憂為孝則天子之孝也公對曰臣聞孝行有三大孝尊親其次不辱其下能養今陛下立身揚名富有天下華夷安泰此實大孝豈同進饘粥侍左右之孝也且以四海之主豈比庶人若與子孫同在一處非所以保根固本之䇿太上皇幸兩儀殿內外羣臣奉見太上皇還西宮太宗從至太安宮還顧謂長孫無忌等曰今天下無事侍太上皇與公等同宴可謂至樂然朕若與公等忘政事但歡宴蓋非常安之法公對曰陛下酣宴之後猶不忘庶政古者堯舜禹湯所以太平實用此道太宗因曰古之人君處廊廟居逸樂臣下一事失所便棄前功解免黜放急處如此公對曰人君發怒於一臣將行刑罰而能念其舊功者鮮矣陛下今發德音臣等幸甚太宗曰朕每思言者君子之樞機談何容易匹夫之間出言不善人或記之成其恥纍朕則四海之主出一言失所虧損豈同匹夫者耶公對曰人君居四海之尊若有虧失古人以為日月之蝕人皆見之實如陛下之所誡慎太宗謂房玄齡曰朕所居殿隋文帝造已經四十餘年損壞處少唯承乾殿是煬帝造工多覔新竒斗拱至小年月雖近破壞已多今為政更欲别作意見亦恐似此屋耳公對曰昔魏文侯時租賦嵗倍有人致賀文侯曰今戶口不加租賦嵗倍此由課斂多譬如皮熟之令大則薄令小則厚人當亦如此由是魏國大化臣今量之陛下為政百夷賓服天下已安但須守今日化道亦歸之於厚此即是已足也太宗謂公曰昨進周齊史看末代之主為惡莫不相似俱至滅亡然兩主若為優劣公對曰二主亡國雖同其行即即疑作則别齊主懦弱政出多門上下相蒙遂至亡國周主立性凶強威福在已亡國之事皆在其身以此而論齊主為劣太宗謂侍臣曰計朕平定四方憂矜百姓雖不及前代哲王比煬帝固應萬倍但君臣相須事同魚水然魚不得水則不立水無魚則廢世有理亂移易風俗終自如舊故知國家唯藉臣佐及百姓共相翊戴方得保其尊榮公對曰昔楚王召詹何為相何曰唯解修身不解理國王又遣使重請何曰未有身正而國不理者今遠方慕化並由陛下克已自修所以夷狄咸知效命太宗御太極殿大赦因謂侍臣曰為君極難法若急恐濫及善人法若寬則不肅姦宄寬猛之間若為折衷公對曰自古為政者因時設教若人情似急則濟之以寬如有寬慢則糾之以猛時既不常所以法令無定太宗曰朕常思自古有天下者皆欲子孫萬代政化過於堯舜及其所行則與堯舜相反如秦始皇亦是英雄之主平定六國已後才免其身至子便失其國桀紂幽厲亦皆喪亡朕為此不得不懼且天下百姓傾耳側目唯看善惡朕豈得不自思之公對曰自古以來人君為難祗為出言即成善惡若人君出言欲聞已過其國即興若出言欲人從已其國即喪古人云一言可以興邦一言可以喪邦正為如此但天下人皆自進於陛下以榮其身若正人即欲以正道輔佐佞人即欲以邪道自媚工巧者則進竒服異器好鷹犬者即欲勸令畋遊所欲自進者不覺為非皆言為是若陛下常守正道則姦人不能自效如開其路則人人欲遂其心矣太宗曰然太宗問侍臣隋大業起居注今有在者否公對曰在者極少太宗曰起居注既無何因今得成史公對曰隋家舊史遺落甚多比其撰録皆是採訪或是其子孫自通家傳參校三人所傳者從二人為實又問隋代誰作起居舍人公對曰崔祖濬杜之松蔡允恭虞世南等臣每見虞世南説祖濬作舍人時大欲記録但隋主意不在此每須書手紙筆所司多不即供為此私將筆抄録非唯經亂零落當時亦不悉具太宗曰隋時百姓假有財物豈能自保自我有天下以來存心撫養無所科差人人皆得營産業守其資財即我所賜向使我徴求無已雖數賞賜亦不如不得公對曰堯舜在上百姓亦云耕田而食鑿井而飲含哺鼓腹而云帝何力於其間哉今陛下如此含養百姓可謂日用而不知矣又奏曰昔晉文公出畋逐獸碭按貞觀政要獸下有於字入大澤迷不知所出其中有漁者文公謂曰我若君也道安從出我且厚賜汝漁者曰臣願有獻文公曰出澤而受之於是送出澤文公命曰子之所欲教寡人者何也願受之漁者曰鴻鵠保大海之中厭而數移徙之小澤則必有繒丸之憂黿鼉保淵按貞觀政要保下有深字厭而出之淺渚則必有網羅釣射之憂今君逐獸碭入至此何行之大遠也文公曰善謂從者記漁者名漁者曰君何以名為君其尊天事地敬社稷固四國慈愛萬人薄賦斂輕租稅者臣亦與焉君不尊天事地不敬社稷不固四國外失禮於諸侯內逆人心一國流亡漁者雖有厚賜不得保也遂辭不受太宗曰卿言是也太宗謂侍臣曰觀古來帝王有盛有衰猶朝之有暮皆為蔽其耳目忠正者不言邪諂者日進不見其過以至於滅亡朕在九重之中不能遍覽天下故布之卿等以為朕之耳目莫以天下無事四海安寧便不存意公對曰自古亡國之主皆為居安忘危處理忘亂所以不能長久陛下富有四海內外清晏遂能留心政道常如臨深履薄國家歷數自然靈長臣等濫當重任今又親蒙誡勗唯知自勵敢不盡心按貞觀政要太宗謂侍臣尚有可愛非君數語及徴所對載舟覆舟語别見後太宗謂侍臣曰月令早晚有公對曰今禮記所載月令起自吕不韋太宗曰但為政專依月令善惡復皆如所記否公對曰秦漢以來聖主依月令事多矣若一依者亦未有善但古者設教勸人為善所行皆欲順時善惡亦未必由此太宗曰月令既起秦時三皇五帝並是聖主因何不行月令公對曰計月令起于上古是以尚書云敬授人時吕不韋止是修古月令未必始起秦代也太宗問曰朕比讀書所見善事並即行之都無所疑至於用人則善惡難别故知人極為不易朕比任使公等數人何因政化猶不及文景公對曰陛下留心正道委任臣等逾於古人正由臣等庸短不能副陛下所寄若論四夷賓服天下無事古來未有似今日者至於文景不足以方聖德公又曰自古人君初為政者皆欲比於堯舜及天下既安即不能終其善事人臣初被委任亦欲盡心竭力及得富貴即欲保全官爵若使君臣常不懈怠豈有天下不安之理太宗曰確論至理誠如公言太宗謂侍臣曰狄人殺衛懿公盡食其肉獨留其肝宏演呼天大哭自出其肝而內懿公之肝今欲求其人不可得也公對曰在君待之而已昔豫讓為智伯報仇欲刺趙襄子襄子執而獲之謂讓曰子昔不事范中行乎智伯盡滅之子乃委質智伯不為報仇今為智伯何也讓答曰臣昔事范中行中行以衆人遇我我以衆人報之智伯以國士遇我我以國士報之在君之禮而已何患無人太宗謂侍臣曰朕昨往懷州有上封事者云何為常差山東衆丁於苑內營造即日徭役似不減隋時懷洛已東凋殘人不堪命按貞觀政要作殘人不堪其命而畋獵猶數驕逸之主也今者復來懷州遊畋是不得復至洛陽矣夫四時搜狩既是帝王常禮今幸懷州秋毫不干於百姓凡上書諫爭自有常凖臣貴有辭主貴能改如斯詆毁有似咒詛公對曰國家開正正疑作直言之路所以上封者極多陛下親自披閲或冀片言可取所以僥幸之士得肆醜辭臣諫其君甚難按貞觀政要難作須折衷從容諷動使行之孔子曰凡諫有五吾從諷諫漢元帝常酬祭宗廟按貞觀政要作以酎祭宗廟出便門御樓船御史大夫薛廣德當乘輿前免冠頓首曰宜從橋陛下不聽臣按貞觀政要臣下有言字臣自刎以頸血汚車輪陛下不得入廟矣元帝不悅光祿勳按貞觀政要勳作卿張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危廣德言不可不聽元帝曰曉人不當如是耶乃從橋以此而言張猛可謂能諫其君者也公拜掃還鄉太宗遣三衛二十人從仍借殿中馬三十匹賜物七百段並給傳乘至是還奉見焉太宗勞之曰今日卿至真可謂喜也公再拜謝太宗乃問所經百姓安否公對曰百姓咸蒙亭毒之恩並得安居樂業太宗曰朕存心愛養不愧古人所未免百姓之言唯獵一事耳時桂陽主在坐奏稱陛下出遊唯將近親左右及給使等何關百姓公曰譬如人之故舊有兒子無賴破其産雖不關已然心必惡之又曰去冬暮從懷州還有人言陛下復欲幸關南在外悉裝束訖而竟不行因何有此消息太宗笑曰當時實有此心但畏卿嗔遂即不去公再拜謝太宗謂侍臣曰帝王之業草創與守文孰難左僕射房玄齡奏稱天地草昧羣雄競逐攻破乃降戰敗乃服由此言之草創為難公對曰帝王之起必由仁德天下樂推同心協力為物除害天授人與翻為不難然既得之後志趣驕逸人樂安靜而行役不休人已凋殘而裒斂不息有國之弊常由此起以斯而言守文則難太宗謂房玄齡曰卿所對不如徴之切也太宗謂侍臣曰君亂於上臣理於下或臣亂於下君理於上二者茍逢逢原本作違今從貞觀政要改正何者為甚公對曰君心向理則照見下非若誅一勸百誰敢不畏若惛暴於上忠諫不從雖百里奚伍子胥之在吳虞不救其禍太宗曰必如此也齊文宣惛暴楊遵彥以正道扶之得理如何公對曰遵彥彌縫暴主救理人物才得免亂亦甚艱辛與聖主嚴明臣下畏法不同日而語太宗謂侍臣曰山崩川竭自古以為災比來水旱不調抑亦由人事公謝曰山有朽壤而崩古人不以為患唯政教有失乃以為災太宗曰然太宗謂侍臣曰朕觀隋主文集博物有才亦知悅堯舜之風醜桀紂之行然而行事即與言相違何也公對曰自古稱人主之善在有君人之量能任使人智者為之謀勇者為之戰雖聰明聖哲以黈纊冕旒埀耳目隋主雖有俊才無人君之量恃才驕物所以至於滅亡太宗曰然昔漢武征役不息戶口減半中途能改還得傳祚子孫向使隋主蚤悟亦不至滅亡也太宗曰往嵗馬料甚厚今唯料麩三升數年來又放宫人三五千人出準計所費與舊當減半何為往日人多料厚而常足今日人少料薄反以不供何也公對曰往嵗所須皆於百姓取足今日所用皆於倉庫出供所用雖多不擾百姓所以用雖少於往時而供進時有所闕太宗曰今人與古人同邪公對曰人多以古人淳朴今人澆浮以臣量之勢亦相似太宗曰今之人固不及古古之君臣為化唯以百姓心為心近代帝王唯損百姓以適其欲朕今與公等雖不及古然須以百姓為心不得有損於物而自奉也慶善樂為文舞破陳樂為武舞詔公及虞世南褚亮李百藥等為之詞太宗謂侍臣曰昔周公相成王制禮作樂久之乃成逮朕即位數年之間成此二樂五禮又復刋定未知堪為後代法否朕觀前王有功於人者作事施令有即違違疑作為法所貴不忘其德者也朕既平定天下安堵海內若德惠不倦有始善終自我作古何慮不法若遂無德於物後代何所遵承以此而言後法不法猶在朕耳公對曰陛下撥亂反正功高百王自開闢以來未有如陛下者也更創新樂兼修大禮自我作古萬代取法豈止子孫而已太宗謂侍臣曰太子師保古難其選成王幼小以周召為保傳左右皆賢足以長仁致化稱為聖主及秦之胡亥始皇所愛趙高作傅教以刑法及其篡也誅功臣殺親戚酷烈不已旋踵亦亡以此而言人之善惡誠由近習朕弱冠交遊唯柴紹竇誕然則誕等為人既非三益及朕居寶位經理天下雖不及堯禹之明庶免乎孫皓高緯之暴以此言之復不由染何也公對曰中人可與為善亦可與為惡然上智之人自無所染陛下受命自天平定寇亂救兆人之命旋踵致太平豈紹誕之徒能纍聖德但經經原本作傳今從貞觀政要改正云放鄭聲遠佞人近習之間尤宜深慎太宗稱善太宗謂侍臣曰漢代常以八月選洛陽中子女姿色端麗者載還後宫此不可為法然即日宫內甚多配役之口使其誕乳諸王是非所宜據此論選補宮列理宜依禮公對曰人多惑嬖色乃致敗亂周幽惑褒姒晉獻惑驪姬耽於寵欲廢嫡立庶幽王因此身死遂喪西周獻公身雖獲沒禍延數代嬪御之間所宜深慎太宗問侍臣曰帝王之興必有天命非幸而得之也房玄齡對曰王者必有天命太宗曰此言是也朕觀古之帝王有天命者其勢如神不行而至其無天命終至滅亡昔周文王漢高祖啓洪祚初受命則赤雀來始發迹則五星聚此並上天埀示徴驗不虛非天所命理難妄得朕若仕隋朝不過三衛亦自惰慢不為時須公對曰易云潛龍勿用言聖德潛藏之時自不為凡庶所識所以漢祖仕秦不踰亭長太宗謂房玄齡曰封禪是帝王盛事比表請者不絶公等以為何如公對曰帝王在德不在封禪自喪亂以來近泰山州縣凋殘最甚若車駕既行不能全無使役此便是因封禪而勞役百姓太宗曰封禪之事不自取功績歸之於天譬如玄齡等功臣雖有益於國能自謙讓歸之於朕豈似似疑作以不言而欲自取今向泰山功歸於天有似於此然朕意常以嵩高既是中嶽何謝謝疑作封太山公等評議按通鑑貞觀六年羣臣表請封禪徴奏以為不可語與此異太宗問公曰朕為人主實仰止古先帝王至於積德纍仁豐功厚利四者朕皆行之何等優劣公對曰德仁功利陛下兼行矣至於功利二善所益居多夫平海內之亂除戎狄之害是陛下之功安堵黎元各復生業是陛下之利太宗謂侍臣曰夫賢人出仕進則利物榮主退則官達名成勤勤疑作近於此事聞之益少唯有見惡如崩淫酒是務此皆不學而能是善人常少惡人居多古人稱百年一賢謂之比戶企佇竒才常不可得公對曰夫賢人居則善其身達則兼濟其物是以明聖求之不有懈怠太宗謂侍臣曰朕聞自古帝王亦不能常化假令內安必有外擾當令令疑作今遠夷率服百榖豐稔賊盜不作內外寧靜朕喜得此事故共公等樂飲此非朕一人之力亦由公等共相存按貞觀政要存作匡輔然安不忘亡理不忘亂雖知今日無事亦須思慮終始常得如此始是可貴公對曰自古以來元首股肱不能備具或時君聖臣即不賢或遇賢臣即無聖主今陛下聖明所以致化臣等駑蹇不稱陛下所任然臣等雖不堪任用陛下放黜即得若有賢臣但令君不思化亦無所益今天下大平臣等按貞觀政要等下有猶未二字以為喜此由按貞觀政要此由作惟願陛下居安思危孜孜不怠太宗曰萬幾事重豈得不思公可語起居郎常書笏上云居安思危朕若不思即向朕道太宗與大將軍藺謨語謨不對太宗怒而繫之後知其聾乃釋不問語侍臣曰我昨發怒藺謨若遂加其罪豈不枉濫公對曰古者帝王多因喜怒遂濫其賞罰今陛下思怒藺謨遂能却更思省若此心不移四海之福有司奏近臣所薦凌敬乞貸之狀太宗責公等濫進何也公對曰臣等每蒙顧問常具言其長短有學識強諫爭是其所長愛生産好經營是其所短今其為人作碑文教人讀漢書即附託官人回易求利於臣等所悅事實未乖按貞觀政要作與臣等所説不同誤陛下未見其長唯見其短以為臣等欺罔實不甘心高麗等三番僧求學至中國遊萊州以聞太宗曰不須遣來此非為學問但覘國家虛實耳公對曰陛下所為若善此等固當取則若不善雖拒蠻夷亦無益也太宗曰書云可愛非君可畏非民天子者有道則人推而為之主無道則人棄而不用誠可畏也公對曰古語云君舟也人水也水能載舟亦能覆舟可不畏哉按貞觀政要併入前帝王有盛衰節內權貴疾公每言於太宗曰魏徴凡所諫爭委曲反覆不從不止意以陛下為幼主不同於長君太宗曰朕少不學問唯好弓馬至於起義即有大功既封為王偏蒙偏愛理道正術都不留心及為太子初入東宫思安天下欲克已為政唯魏徴與王圭導我以禮宏我以道勉強從之大覺利益遂力行不息以致太平並魏徴等之力所以特加禮重每事聽從非私之也言者乃慚而止霍行斌告變公預其事太宗覽之謂侍臣曰此言大無由緒不須鞫問行斌宜付所司定罪公曰臣蒙近侍未以善聞而有大逆之名罪合萬死陛下曲埀矜照臣將何以自安請鞫之尋仍拜謝太宗曰卿之纍仁積行朕所自知愚人相謗豈能由已不須致謝按貞觀政要載有告徴謀反太宗不問遽斬所告者當即此事但無行斌姓名房玄齡王圭掌內外考績治書侍御史權萬紀奏其不平追案勘問王圭不伏太宗付侯君集案之公奏稱無阿私必不可推鞫太宗大怒令君集勘當未奏太宗問君集君集奏稱臣謂魏徴玄齡王圭挾私濫考何得阿黨固執言不可推徴答云玄齡王圭俱是國家重臣並以忠正任使其所考者既多或一兩人不當祗是見有左右終非心有阿私若即推繩不相信任此事便不可信何以堪當重委假令錯繆有實未足虧損國家窮鞫若虛失委大臣之體且萬紀每日常在考堂必有乖違足得論正當時鑒見一無陳説身不得考方始糾彈徒發在上嗔怒非是誠心為國無益於上有損於下所惜傷於政體不敢有所阿黨遂釋不問公頻論止足之分太宗未之許公曰羣臣委任既久許其避退權用之次觀其能否既得預察羣才又無獨任之謗使善人得進長廉讓之風若能行之於令足為將來永法太宗曰信如公言然論者猶有同異時至京下當别議太宗謂羣臣曰為政者豈待堯舜之君龍益之佐自我驅使魏徴天下乂安邉境無事時和嵗稔其忠益如此先是將發十六道黜陟大使畿內道未有其人太宗親定之問房玄齡等曰此道事最重誰可充使右僕射李靖對曰畿內事非魏徴莫可太宗作色曰朕欲向九成事亦不小寧遣魏徴助朕按貞觀政要作寧可遣魏徴出使朕字屬下句每行不欲與其相離者適謂其見朕是非必無所隱今從公等語遣去朕若有得失公等能止邪乃令李靖充使公從往九成宫魏鄭公諫續録卷上
